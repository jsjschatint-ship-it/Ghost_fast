name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./...

  build-linux:
    name: build linux ${{ matrix.arch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            cc: gcc
            deps: build-essential pkg-config
          - arch: arm64
            cc: aarch64-linux-gnu-gcc
            deps: build-essential pkg-config gcc-aarch64-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/Ghost-linux-${{ matrix.arch }} ./cmd/enscan

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-linux-${{ matrix.arch }}
          path: dist/Ghost-linux-${{ matrix.arch }}

  build-windows:
    name: build windows amd64
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Build
        shell: powershell
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
          CC: gcc
        run: |
          $env:PATH = "C:\msys64\mingw64\bin;" + $env:PATH
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags="-s -w" -o dist/Ghost-windows-amd64.exe ./cmd/enscan

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-windows-amd64
          path: dist/Ghost-windows-amd64.exe

  build-macos:
    name: build macos ${{ matrix.arch }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: macos-13
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/Ghost-darwin-${{ matrix.arch }} ./cmd/enscan

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-darwin-${{ matrix.arch }}
          path: dist/Ghost-darwin-${{ matrix.arch }}
